<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="ID=edge">
<meta name="viewport" content="width=device-width,initial-scale=1" >
<title>My Bootstrap Page</title>
<link href="../css/bootstrap.min.css" rel="stylesheet">
<link href="../css/bootstrap-theme.min.css" rel="stylesheet">

<style>

.rowspacer{
	padding:10px 10px 10px 10px ;
}

input.validateme[type=text]:valid
{
	
	color:green;
}


input.validateme[type=text]:valid ~ .input-validation::before 
{
	
	color:green;
}


input.validateme[type=text]:invalid
{
	
	color:red;
}




</style>


</head>
<body>
<div id="maincontainer" class="container">
   <div id="row1" class="row rowspacer ">
	   <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">

	   	<form role="form">

	   		<div class="form-group">
	   			<label for="theEmail">Please enter your email</label>
	   			<input type="email" class="form-control" id="Email" placeholder="raghu@yahoo.com" />
	   		</div>

	   		<div class="form-group">
	   			<label for="thePWD">Password</label>
	   			<input type="password" class="form-control" id="pwd" placeholder="password" />
	   		</div>


	   		<div class="form-group">
	   			<label for="theDay">Todays date?</label>
	   			<input type="date" class="form-control" id="day" placeholder="enter date" />
	   		</div>

	   		<input type="submit" value="submit" />

	   	</form>
	   	<hr />

	   	<form role="form">
	   		<div class="form-group has-feedback">

	   			<label for="ccnum">what is your credit card number?</label>
	   			<input type="text" class="form-control validateme" id="ccnum" pattern="[0-9]{13,16}"
					   placeholder="9999-9999-9999-9999" required />

	   			<span class="glyphicon glyphicon-credit-card form-control-feedback"></span>

	   		</div>
	   		<div class="form-group">
	   			<label for="color"> Pick a Color</label>
	   			<input type="color" id="colorpicker">
	   		</div>
	   		<input type="submit" value="submit" />
	   	</form>

	   	<hr />


	   	<form role="form">

	   		<div id="successInput" class="form-group has-success has-feedback">
	   			<label class="control-label" for="inputSuccess2">Input with Success</label>
	   			<input type="text" id="inputSuccess2" class="form-control">
	   			<span class="glyphicon glyphicon-ok form-control-feedback"></span>
	   			<span class="help-block"> Show this on Success</span>
	   		</div>


	   		<div id="warningInput" class="form-group has-warning has-feedback">
	   			<label class="control-label" for="inputWarning2">Input with Warning</label>
	   			<input type="text" id="inputWarning2" class="form-control">
	   			<span class="glyphicon glyphicon-warning-sign form-control-feedback"></span>
	   			<span class="help-block"> Show this on Warning</span>
	   		</div>


	   		<div id="errorInput" class="form-group has-error has-feedback">
	   			<label class="control-label" for="inputError2">Input with Error</label>
	   			<input type="text" id="inputError2" class="form-control">
	   			<span class="glyphicon glyphicon-remove form-control-feedback"></span>
	   			<span class="help-block"> Show this on Error</span>
	   		</div>

	   	</form>








	   </div>
   </div>
</div>




<script src="../js/jquery-3.5.1.min.js" type="text/javascript"></script>
<script src="../js/bootstrap.min.js" type="text/javascript"></script>
</body>

</html>
