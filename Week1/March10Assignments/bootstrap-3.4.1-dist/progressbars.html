<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="ID=edge">
<meta name="viewport" content="width=device-width,initial-scale=1" >
<title>My Bootstrap Page</title>
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/bootstrap-theme.min.css" rel="stylesheet">
<style>
.rowspacer{
	padding:10px 10px 10px 10px;
}
</style>
</head>
<body>
	<div id="maincontainer" class="container">

		<div id="row1" class="rowspacer row">
			<div class="col-md-12 col-sm-12 col-lg-12 col-xs-12">

				<h3>regular progress bar</h3>
				<div class="progress">
					<div id="progress1" class="progress-bar" role="progressbar" style="width:40%">
						<span id="progress1Value">40 percent complete</span>
					</div>
				</div>

			</div>

		</div>

		<div id="row7" class="row rowspacer">
			<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">

				<h3> Controls</h3>
				<div id="thebuttons" class="btn-group">

					<button class="btn btn-danger" id="btnresettozero" onclick="javascript:resetAlltozero()"> Reset All to Zero</button>
					<button class="btn btn-info" id="btnresettostart" onclick="javascript:resetAlltorandom()"> Reset All to random</button>
					<button class="btn btn-success" id="btnstartprogs" onclick="javascript:startprogress()"> start progress</button>



				</div>

			</div>
		</div>




	</div>








<script src="js/jquery-3.5.1.min.js" type="text/javascript"></script>
<script src="js/bootstrap.min.js" type="text/javascript"></script>

<script type="text/javascript">
var $prog1=$("#progress1");
var $prog1Value=$("#progress1Value");




function resetAlltozero()
{
	$prog1.css('width', 0);
	$prog1Value.text('0 percent completee')

}


function resetAlltorandom()
{

	var value = Math.floor(Math.random() * 100) + 1;

	$prog1.css('width',value+"%");
	$prog1Value.text(value+' % completee')



}


function startprogress()
{

var value1=Math.floor(Math.random() * 100 )+1;

var value2=Math.floor(Math.random() * 100 )+1;

var value3=Math.floor(Math.random() * 100 )+1;

var value4=Math.floor(Math.random() * 100 )+1;

var value5=Math.floor(Math.random() * 100 )+1;

var value6=Math.floor(Math.random() * 100 )+1;

var value7=Math.floor(Math.random() * 100 )+1;

var value8=Math.floor(Math.random() * 100 )+1;


$prog1.css('width',value1 + '%');
$prog1Value.text(value1 + ' % complete');


$prog2.css('width',value2 + '%');
$prog2Value.text(value2 + ' % complete');


$prog3.css('width',value3 + '%');
$prog3Value.text(value3 + ' % complete');


$prog4.css('width',value4 + '%');
$prog4Value.text(value4 + ' % complete');

$prog5.css('width',value5 + '%');
$prog5Value.text(value5 + ' % complete');



$prog6.css('width',value6/4 + '%');
$prog6Value.text(value6/4 + ' % complete');


$prog7.css('width',value7/4+ '%');
$prog7Value.text(value7/4 + ' % complete');

$prog8.css('width',value8/2 + '%');
$prog8Value.text(value8/2 + ' % complete');



var myVar=setInterval(function(){ incrementpBars()},5000);
}


function incrementpBars()
{

var w1=Math.ceil($prog1.width());
var w2=Math.ceil($prog1.offsetParent().width());
var w3=Math.ceil(100 *w1/w2);
if(w3 < 100) w3+=4;
if(w3 > 100 ) w3=100;
$prog1.css('width',w3 + '%');
$prog1Value.text(w3 + ' % complete');


var w1=Math.ceil($prog2.width());
var w2=Math.ceil($prog2.offsetParent().width());
var w3=Math.ceil(100 *w1/w2);
if(w3 < 100) w3+=4;
if(w3 > 100 ) w3=100;
$prog2.css('width',w3 + '%');
$prog2Value.text(w3 + ' % complete');


var w1=Math.ceil($prog3.width());
var w2=Math.ceil($prog3.offsetParent().width());
var w3=Math.ceil(100 *w1/w2);
if(w3 < 100) w3+=4;
if(w3 > 100 ) w3=100;
$prog3.css('width',w3 + '%');
$prog3Value.text(w3 + ' % complete');

var w1=Math.ceil($prog4.width());
var w2=Math.ceil($prog4.offsetParent().width());
var w3=Math.ceil(100 *w1/w2);
if(w3 < 100) w3+=4;
if(w3 > 100 ) w3=100;
$prog4.css('width',w3 + '%');
$prog4Value.text(w3 + ' % complete');

var w1=Math.ceil($prog5.width());
var w2=Math.ceil($prog5.offsetParent().width());
var w3=Math.ceil(100 *w1/w2);
if(w3 < 100) w3+=4;
if(w3 > 100 ) w3=100;
$prog5.css('width',w3 + '%');
$prog5Value.text(w3 + ' % complete');


var w1=Math.ceil($prog6.width());
var w2=Math.ceil($prog6.offsetParent().width());
var w3=Math.ceil(100 *w1/w2);
if(w3 < 25) w3+=2;
if(w3 > 25) w3=25;
$prog6.css('width',w3 + '%');
$prog6Value.text(w3 + ' % complete');


var w1=Math.ceil($prog7.width());
var w2=Math.ceil($prog7.offsetParent().width());
var w3=Math.ceil(100 *w1/w2);
if(w3 < 25) w3+=2;
if(w3 > 25) w3=25;
$prog7.css('width',w3 + '%');
$prog7Value.text(w3 + ' % complete');


var w1=Math.ceil($prog8.width());
var w2=Math.ceil($prog8.offsetParent().width());
var w3=Math.floor(100 *w1/w2);
if(w3 < 50) w3+=4;
if(w3 > 50) w3=50;
$prog8.css('width',w3 + '%');
$prog8Value.text(w3 + ' % complete');




}




</script>

</body>

</html>
