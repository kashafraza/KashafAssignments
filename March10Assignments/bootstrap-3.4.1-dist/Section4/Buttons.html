<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="ID=edge">
<meta name="viewport" content="width=device-width,initial-scale=1" >
<title>My Bootstrap Page</title>
<link href="../css/bootstrap.min.css" rel="stylesheet">
<link href="../css/bootstrap-theme.min.css" rel="stylesheet">

<style>

.rowspacer{
	padding:10px 10px 10px 10px;
}

.myBTNclass1{
	
	background:black;
	color:white;
}

.myBTNclass1.active{
	background:gray;
	color:orange;
}

.myBTNclass1:hover {
	color:yellow;
	
}

myBTNclass1:focus{
	
	color:aqua;
}

</style>

</head>
<body>

	<div id="maincontainer" class="container">

		<div id="row1" class="row rowspacer">
			<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<button type="button" class="btn myBTNclass1">A Button</button>
				<button type="button" class="btn myBTNclass1 active">A Button</button>
				<button type="button" class="btn myBTNclass1 focus hover">A Button</button>
				<button type="button" class="btn btn-default">A default button</button>

			</div>
		</div>

		<div id="row2" class="row rowspacer">
			<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">

				<button type="button" class="btn btn-default">A default button</button>
				<button type="button" class="btn btn-success">A success button</button>
				<button type="button" class="btn btn-info">A info button</button>
				<button type="button" class="btn btn-warning">A warning button</button>
				<button type="button" class="btn btn-danger">A danger button</button>
				<button type="button" class="btn btn-primary">A primary button</button>
			</div>
		</div>



		<div id="row3" class="row rowspacer">
			<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">

				<a href="http://www.google.com" class="btn btn-link">Google</a>
				<a href="http://www.google.com" class="btn btn-danger">Google</a>
				<a href="https://raghutech.net" class="btn btn-primary">raghutechnolgies</a>
				<a href="http://www.google.com" class="btn btn-info">Google</a>
				<a href="http://www.google.com" class="btn btn-success">Google</a>
				<a href="http://www.google.com" class="btn btn-warning">Google</a>

			</div>
		</div>


		<div id="row4" class="row rowspacer">
			<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">

				<button type="button" class="btn btn-default btn-lg">A default button</button>
				<button type="button" class="btn btn-success btn-sm">A success button</button>
				<button type="button" class="btn btn-info btn-xs">A info button</button>
				<button type="button" class="btn btn-warning disabled">A warning button</button>
				<button type="button" class="btn btn-danger active">A danger button</button>
				<button type="button" class="btn btn-primary">A primary button</button>
			</div>
		</div>

	</div>


	







<script src="../js/jquery-3.5.1.min.js" type="text/javascript"></script>
<script src="../js/bootstrap.min.js" type="text/javascript"></script>
</body>

</html>
